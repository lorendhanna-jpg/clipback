name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: clipback-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish "latest" release with the APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk ClipBack.apk
          gh release delete latest --cleanup-tag -y || true
          gh release create latest ClipBack.apk \
            --title "ClipBack (latest build)" \
            --notes "On your Android phone: download ClipBack.apk, open it, and allow the install when asked."
