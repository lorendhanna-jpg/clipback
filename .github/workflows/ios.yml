name: Build iOS

on:
  push:
    branches: [main]
    paths: ['ios/**', '.github/workflows/ios.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen

      - name: Build for iOS Simulator (compile check, no signing)
        run: |
          cd ios
          xcodebuild -project ClipBack.xcodeproj -scheme ClipBack \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build
