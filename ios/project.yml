name: ClipBack
options:
  bundleIdPrefix: com.clipback
  deploymentTarget:
    iOS: "16.0"
targets:
  ClipBack:
    type: application
    platform: iOS
    sources: [ClipBack]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipback.app
        INFOPLIST_FILE: ClipBack/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClipBack/ClipBack.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: ClipBackBroadcast
        embed: true
  ClipBackBroadcast:
    type: app-extension
    platform: iOS
    sources: [ClipBackBroadcast]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipback.app.broadcast
        INFOPLIST_FILE: ClipBackBroadcast/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClipBackBroadcast/ClipBackBroadcast.entitlements
        GENERATE_INFOPLIST_FILE: false
